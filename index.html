<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
         :root {
            --cream: #F5EFE0;
            --brown: #2C1810;
            --gold: #C4823A;
            --gold2: #E8A44A;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--cream);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }
        /* YouTube player kecil tapi valid — harus ada dimensi nyata */
        
        #yt-wrap {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 2px;
            height: 2px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
        
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .9s ease;
            background: var(--cream);
            overflow: hidden;
        }
        
        .screen.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: .5;
        }
        /* SCREEN 1 */
        
        #s1 .bg-word {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: 22vw;
            font-weight: 900;
            color: var(--brown);
            opacity: .04;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }
        
        #s1 .bg-word.t {
            top: -3vw;
        }
        
        #s1 .bg-word.b {
            bottom: -3vw;
        }
        
        .tap-btn {
            width: 168px;
            height: 168px;
            border-radius: 50%;
            background: var(--brown);
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: pulse 2.2s ease infinite;
            transition: transform .3s;
            z-index: 1;
        }
        
        .tap-btn:hover {
            transform: scale(1.07);
        }
        
        .tap-btn .ico {
            font-size: 46px;
            margin-bottom: 6px;
        }
        
        .tap-btn span {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--cream);
            font-weight: 600;
            text-transform: uppercase;
        }
        
        #s1 .sub {
            margin-top: 28px;
            font-size: 11px;
            letter-spacing: 2.5px;
            color: var(--brown);
            opacity: .35;
            text-transform: uppercase;
            animation: blink 2s ease infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(44, 24, 16, .15), 0 0 0 0 rgba(44, 24, 16, .07)
            }
            50% {
                box-shadow: 0 0 0 22px rgba(44, 24, 16, .08), 0 0 0 44px rgba(44, 24, 16, .03)
            }
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: .35
            }
            50% {
                opacity: .12
            }
        }
        /* SCREEN 2 */
        
        #s2 {
            background: var(--brown);
        }
        
        #s2::before {
            opacity: .08;
        }
        
        .note-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .fnote {
            position: absolute;
            top: -20px;
            animation: floatUp 3.5s ease-in forwards;
            opacity: 0;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) rotate(-8deg)
            }
            15% {
                opacity: 1
            }
            80% {
                opacity: .6
            }
            100% {
                opacity: 0;
                transform: translateY(-110vh) rotate(12deg)
            }
        }
        
        #s2 .lbl {
            font-size: 11px;
            letter-spacing: 5px;
            color: var(--cream);
            opacity: .4;
            text-transform: uppercase;
            margin-bottom: 16px;
            animation: fadeUp 1s ease both;
        }
        
        #s2 .song {
            font-family: 'Playfair Display', serif;
            font-size: clamp(34px, 10vw, 66px);
            font-weight: 700;
            color: var(--cream);
            text-align: center;
            line-height: 1.1;
            animation: fadeUp 1s ease .2s both;
        }
        
        #s2 .song em {
            display: block;
            font-style: italic;
            color: var(--gold2);
            font-weight: 400;
        }
        
        #s2 .artist {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            letter-spacing: 4px;
            color: var(--cream);
            opacity: .45;
            margin-top: 8px;
            animation: fadeUp 1s ease .35s both;
        }
        
        .bars {
            display: flex;
            gap: 5px;
            margin-top: 32px;
            align-items: flex-end;
            height: 42px;
            animation: fadeUp 1s ease .5s both;
        }
        
        .bar {
            width: 5px;
            border-radius: 3px;
            background: var(--gold);
            animation: beat .7s ease infinite alternate;
        }
        
        .bar:nth-child(1) {
            height: 55%;
            animation-delay: .00s
        }
        
        .bar:nth-child(2) {
            height: 100%;
            animation-delay: .08s
        }
        
        .bar:nth-child(3) {
            height: 35%;
            animation-delay: .16s
        }
        
        .bar:nth-child(4) {
            height: 75%;
            animation-delay: .12s
        }
        
        .bar:nth-child(5) {
            height: 50%;
            animation-delay: .04s
        }
        
        .bar:nth-child(6) {
            height: 88%;
            animation-delay: .20s
        }
        
        .bar:nth-child(7) {
            height: 40%;
            animation-delay: .10s
        }
        
        @keyframes beat {
            from {
                transform: scaleY(.25)
            }
            to {
                transform: scaleY(1)
            }
        }
        /* Manual play button — muncul kalau autoplay gagal */
        
        #play-fallback {
            margin-top: 28px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: fadeUp .6s ease both;
        }
        
        #play-fallback button {
            background: var(--gold);
            border: none;
            border-radius: 50px;
            padding: 12px 32px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform .2s, opacity .2s;
        }
        
        #play-fallback button:hover {
            transform: scale(1.05);
        }
        
        #play-fallback p {
            font-size: 11px;
            letter-spacing: 1.5px;
            color: var(--cream);
            opacity: .35;
            text-transform: uppercase;
        }
        /* SCREEN 3 */
        
        .conf-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .conf {
            position: absolute;
            top: -20px;
            border-radius: 2px;
            animation: confFall linear forwards;
            opacity: 0;
        }
        
        @keyframes confFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0)
            }
            100% {
                opacity: 0;
                transform: translateY(110vh) rotate(720deg)
            }
        }
        
        #s3 .eye {
            font-size: 10px;
            letter-spacing: 6px;
            color: var(--brown);
            opacity: .45;
            text-transform: uppercase;
            margin-bottom: 22px;
            animation: fadeUp 1s ease both;
        }
        
        #s3 .big {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            text-transform: uppercase;
            line-height: .9;
            text-align: center;
            overflow: hidden;
        }
        
        #s3 .big .l {
            display: block;
            font-size: clamp(52px, 16vw, 108px);
            color: var(--brown);
            animation: slideUp 1s cubic-bezier(.16, 1, .3, 1) both;
        }
        
        #s3 .big .l:nth-child(1) {
            animation-delay: .08s
        }
        
        #s3 .big .l:nth-child(2) {
            animation-delay: .18s
        }
        
        #s3 .big .nm {
            display: block;
            font-size: clamp(34px, 10vw, 72px);
            color: var(--gold);
            font-style: italic;
            font-weight: 700;
            animation: slideUp 1s cubic-bezier(.16, 1, .3, 1) .32s both;
        }
        
        #s3 .divider {
            width: 56px;
            height: 2px;
            background: var(--gold);
            margin: 22px auto;
            animation: scaleW 1s ease .6s both;
        }
        
        #s3 .dt {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            letter-spacing: 3px;
            color: var(--brown);
            opacity: .45;
            animation: fadeUp 1s ease .8s both;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(110%);
                opacity: 0
            }
            to {
                transform: translateY(0);
                opacity: 1
            }
        }
        
        @keyframes scaleW {
            from {
                transform: scaleX(0)
            }
            to {
                transform: scaleX(1)
            }
        }
        /* SCREEN 4 */
        
        #s4 {
            justify-content: flex-start;
            padding: 40px 20px;
            overflow-y: auto;
        }
        
        #s4::-webkit-scrollbar {
            display: none;
        }
        
        .mhead {
            text-align: center;
            margin: 20px 0 30px;
            animation: fadeUp .8s ease both;
        }
        
        .mhead h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(26px, 7vw, 44px);
            font-weight: 700;
            color: var(--brown);
        }
        
        .mhead p {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--brown);
            opacity: .35;
            text-transform: uppercase;
            margin-top: 6px;
        }
        
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 22px 24px;
            margin-bottom: 14px;
            border-left: 3px solid var(--gold);
            box-shadow: 0 4px 18px rgba(44, 24, 16, .07);
            position: relative;
            animation: fadeUp .7s ease both;
        }
        
        .card .q {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            color: var(--gold);
            opacity: .15;
            position: absolute;
            top: 6px;
            right: 14px;
            line-height: 1;
        }
        
        .card p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px;
            color: var(--brown);
            line-height: 1.7;
            font-style: italic;
        }
        
        .card .from {
            margin-top: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
            font-style: normal;
        }
        /* NAV + BTN */
        
        #nav {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 999;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--brown);
            opacity: .2;
            transition: all .3s;
            cursor: pointer;
        }
        
        .dot.on {
            opacity: 1;
            width: 24px;
            border-radius: 4px;
        }
        
        .dot.lt {
            background: var(--cream);
        }
        
        .dot.lt.on {
            background: var(--gold2);
        }
        
        #nxt {
            position: fixed;
            bottom: 66px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--brown);
            color: var(--cream);
            border: none;
            cursor: pointer;
            z-index: 999;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .2s, background .3s;
            box-shadow: 0 4px 16px rgba(44, 24, 16, .25);
        }
        
        #nxt:hover {
            transform: scale(1.1);
        }
        
        #nxt.lt {
            background: var(--cream);
            color: var(--brown);
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(22px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>

    <!-- YouTube player — harus punya dimensi nyata agar video bisa load -->
    <div id="yt-wrap">
        <div id="yt-player"></div>
    </div>

    <!-- SCREEN 1 -->
    <div class="screen active" id="s1">
        <div class="bg-word t">BIRTHDAY</div>
        <div class="bg-word b">BIRTHDAY</div>
        <button class="tap-btn" onclick="goTo(2)">
    <div class="ico">🎵</div>
    <span>Tap to Open</span>
  </button>
        <p class="sub">Scan · Tap · Celebrate</p>
    </div>

    <!-- SCREEN 2 -->
    <div class="screen" id="s2">
        <div class="note-wrap" id="noteWrap"></div>
        <p class="lbl">Now Playing</p>
        <h1 class="song">About You<em>The 1975</em></h1>
        <p class="artist">Being Funny in a Foreign Language</p>
        <div class="bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <!-- Tombol ini muncul jika autoplay diblokir browser -->
        <div id="play-fallback">
            <button onclick="manualPlay()">▶ Play Music</button>
            <p>Tap jika musik belum menyala</p>
        </div>
    </div>

    <!-- SCREEN 3 -->
    <div class="screen" id="s3">
        <div class="conf-wrap" id="confWrap"></div>
        <p class="eye">It's Your Big Day</p>
        <div class="big">
            <span class="l">Happy</span>
            <span class="l">Birthday</span>
            <span class="nm" id="nameEl">An Nisa</span>
        </div>
        <div class="divider"></div>
        <p class="dt" id="dateEl">2 April 2026</p>
    </div>

    <!-- SCREEN 4 -->
    <div class="screen" id="s4">
        <div class="mhead">
            <h2>For You 💛</h2>
            <p>With love & wishes</p>
        </div>
        <div id="cardList"></div>
        <div style="height:90px"></div>
    </div>

    <div id="nav">
        <div class="dot on" onclick="goTo(1)"></div>
        <div class="dot" onclick="goTo(2)"></div>
        <div class="dot" onclick="goTo(3)"></div>
        <div class="dot" onclick="goTo(4)"></div>
    </div>
    <button id="nxt" onclick="nextScreen()">›</button>

    <script>
        // ==============================
        // CONFIG — UBAH SESUAI KEBUTUHAN
        // ==============================
        const CONFIG = {
            name: "Apdani meidea kinansi",
            date: "24 mei  2026",
            ytVideoId: "tGv7CUutzqU",
            messages: [{
                text: "Selamat ulang tahun! Semoga hari ini menjadi awal dari hal-hal luar biasa yang menantimu. Kamu layak mendapatkan semua kebahagiaan di dunia.",
                from: "💛 Dari Kami Semua"
            }, {
                text: "Di hari yang spesial ini, semoga setiap impianmu satu per satu terwujud. Tetaplah jadi dirimu yang luar biasa!",
                from: "✨ Sahabatmu"
            }, {
                text: "Bertambah satu tahun bukan berarti berkurang — tapi bertambah pengalaman, bertambah bijak, dan bertambah cantik!",
                from: "🌸 Dengan Cinta"
            }, {
                text: "Semoga tahun ini membawamu lebih dekat ke semua hal yang kamu inginkan. Happy birthday, stay blessed always!",
                from: "🎂 Selamanya Bersamamu"
            }, {
                text: "Kamu sudah melewati banyak hal dan kamu masih di sini — kuat, bersinar, luar biasa. Selamat ulang tahun!",
                from: "🌟 From the Heart"
            }]
        };

        // ==============================
        // INIT CARDS
        // ==============================
        document.getElementById('nameEl').textContent = CONFIG.name;
        document.getElementById('dateEl').textContent = CONFIG.date;
        const cardList = document.getElementById('cardList');
        CONFIG.messages.forEach((m, i) => {
            const el = document.createElement('div');
            el.className = 'card';
            el.style.animationDelay = (i * 0.1) + 's';
            el.innerHTML = `<span class="q">"</span><p>${m.text}</p><p class="from">${m.from}</p>`;
            cardList.appendChild(el);
        });

        // ==============================
        // YOUTUBE PLAYER
        // ==============================
        let ytPlayer = null;
        let ytReady = false;
        let pendingPlay = false;
        let fallbackTimer = null;

        // Load YouTube IFrame API
        (function() {
            const s = document.createElement('script');
            s.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(s);
        })();

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', {
                width: '200',
                height: '113',
                videoId: CONFIG.ytVideoId,
                playerVars: {
                    autoplay: 0,
                    controls: 0,
                    rel: 0,
                    iv_load_policy: 3,
                    modestbranding: 1,
                    playsinline: 1
                },
                events: {
                    onReady: onPlayerReady,
                    onError: onPlayerError
                }
            });
        };

        function onPlayerReady(event) {
            ytReady = true;
            clearTimeout(fallbackTimer);
            if (pendingPlay) {
                event.target.playVideo();
                pendingPlay = false;
            }
        }

        function onPlayerError() {
            // Jika error, tampilkan tombol manual
            showFallback();
        }

        function playMusic() {
            if (ytReady && ytPlayer) {
                try {
                    ytPlayer.playVideo();
                    // Cek setelah 2 detik apakah benar-benar playing
                    setTimeout(() => {
                        if (ytPlayer && ytPlayer.getPlayerState && ytPlayer.getPlayerState() !== 1) {
                            showFallback();
                        }
                    }, 2500);
                } catch (e) {
                    showFallback();
                }
            } else {
                pendingPlay = true;
                // Tampilkan fallback jika 5 detik tidak ada suara
                fallbackTimer = setTimeout(showFallback, 5000);
            }
        }

        function manualPlay() {
            if (ytReady && ytPlayer) {
                ytPlayer.playVideo();
                document.getElementById('play-fallback').style.display = 'none';
            }
        }

        function showFallback() {
            const fb = document.getElementById('play-fallback');
            if (fb) fb.style.display = 'flex';
        }

        // ==============================
        // NAVIGATION
        // ==============================
        let current = 1;
        let musicStarted = false;

        function goTo(n) {
            if (n < 1 || n > 4) return;

            if (!musicStarted) {
                playMusic();
                musicStarted = true;
            }

            document.querySelectorAll('.screen').forEach((s, i) => {
                s.classList.toggle('active', i + 1 === n);
            });

            document.querySelectorAll('.dot').forEach((d, i) => {
                d.classList.toggle('on', i + 1 === n);
                d.classList.toggle('lt', n === 2);
            });

            const btn = document.getElementById('nxt');
            btn.style.display = n === 4 ? 'none' : 'flex';
            btn.classList.toggle('lt', n === 2);

            if (n === 2) spawnNotes();
            if (n === 3) spawnConfetti();

            current = n;
        }

        function nextScreen() {
            goTo(current + 1);
        }

        // ==============================
        // FLOATING NOTES
        // ==============================
        function spawnNotes() {
            const wrap = document.getElementById('noteWrap');
            wrap.innerHTML = '';
            const notes = ['♪', '♫', '♩', '♬', '🎵', '🎶'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'fnote';
                    el.textContent = notes[Math.floor(Math.random() * notes.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.fontSize = (18 + Math.random() * 20) + 'px';
                    el.style.animationDuration = (3 + Math.random() * 2) + 's';
                    wrap.appendChild(el);
                    setTimeout(() => el.remove(), 6000);
                }, i * 160);
            }
        }

        // ==============================
        // CONFETTI
        // ==============================
        function spawnConfetti() {
            const wrap = document.getElementById('confWrap');
            wrap.innerHTML = '';
            const cols = ['#C4823A', '#E8A44A', '#D4826A', '#2C1810', '#8B5E3C', '#F5EFE0'];
            for (let i = 0; i < 70; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'conf';
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.background = cols[Math.floor(Math.random() * cols.length)];
                    el.style.width = (5 + Math.random() * 8) + 'px';
                    el.style.height = (8 + Math.random() * 12) + 'px';
                    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    el.style.animationDuration = (2.5 + Math.random() * 3) + 's';
                    el.style.animationDelay = (Math.random() * 1.5) + 's';
                    wrap.appendChild(el);
                    setTimeout(() => el.remove(), 6000);
                }, i * 25);
            }
        }

        // ==============================
        // SWIPE & KEYBOARD
        // ==============================
        let tx = 0;
        document.addEventListener('touchstart', e => {
            tx = e.touches[0].clientX;
        });
        document.addEventListener('touchend', e => {
            const dx = tx - e.changedTouches[0].clientX;
            if (Math.abs(dx) > 50) dx > 0 ? goTo(current + 1) : goTo(current - 1);
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextScreen();
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
        });
    </script>
</body>

</html>
